name: Build Windows EXE on Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build full and lite variants
        shell: pwsh
        run: |
          ./scripts/build_variants.ps1 -Version "${{ github.ref_name }}" -SmokeTest

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PhotoDedup-full.exe
            dist/PhotoDedup-lite.exe
            dist/build-variants-${{ github.ref_name }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
