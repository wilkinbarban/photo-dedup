name: Publish Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate tag/version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/main/photo_dedup.py)

          if [ -z "$APP_VERSION" ]; then
            echo "Could not read __version__ from src/main/photo_dedup.py"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match app version ($APP_VERSION)."
            exit 1
          fi

      - name: Generate RELEASE.md from CHANGELOG
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/generate_release_md.py --version "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PhotoDedup ${{ github.ref_name }}
          body_path: RELEASE.md
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
